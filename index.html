<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella Bay</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #ffe4ec, #ffd1dc);
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: rgba(255,182,193,0.92);
  display: flex;
  align-items: center;
  padding: 0 15px;
  z-index: 1000;
}

/* BUTTON */
.bb-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffb6c1, #b03060);
  color: white;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* CONTENT */
.content {
  margin-top: 80px;
  padding: 20px;
  max-width: 950px;
  margin-left: auto;
  margin-right: auto;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px 20px;
  color: white;
  border-radius: 20px;
  background:
    linear-gradient(rgba(255,182,193,0.80), rgba(255,105,180,0.85)),
    url("https://images.pexels.com/photos/3992873/pexels-photo-3992873.jpeg");
  background-size: cover;
  background-position: center;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 64px;
}

/* BUTTON STYLE */
.btn {
  display: inline-block;
  padding: 14px 30px;
  border-radius: 30px;
  background: linear-gradient(135deg, #ff69b4, #ffb6c1);
  color: white;
  text-decoration: none;
  font-weight: bold;
  margin-top: 15px;
  cursor: pointer;
}

/* CARD */
.card {
  background: #ffe4ec;
  padding: 16px;
  margin: 10px 0;
  border-radius: 14px;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="bb-btn">BB</div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- HERO -->
  <div class="hero">
    <h1>Bella Bay</h1>
    <p>Coiffure mobile à Montréal & Laval</p>

    <button class="btn" onclick="bookNow()">
      Réserver maintenant
    </button>

    <button class="btn" onclick="openWhatsApp()">
      💬 WhatsApp
    </button>

  </div>

  <!-- SERVICES -->
  <section>

    <h2>Services</h2>

    <div class="card">Coupe femme — 75$</div>
    <div class="card">Brushing — 50$</div>
    <div class="card">Coupe + Brushing — 120$</div>
    <div class="card">Coloration — à partir de 90$</div>
    <div class="card">Mèches — à partir de 120$</div>
    <div class="card">Balayage — à partir de 150$</div>
    <div class="card">Gloss — 70$</div>
    <div class="card">Extensions — consultation</div>

  </section>

</div>

<script>

// Notifications
window.addEventListener("load", function () {
  if ("Notification" in window) {
    Notification.requestPermission();
  }
});

// Réservation Google Form
function bookNow() {

  window.open("https://forms.gle/BLFRhR3Hfh3MPPzw5", "_blank");

  alert("💖 Bella Bay : vous allez être redirigée vers la réservation !");

  if (Notification.permission === "granted") {
    new Notification("Bella Bay 💇‍♀️", {
      body: "Formulaire de réservation ouvert !",
      icon: "https://images.pexels.com/photos/3992873/pexels-photo-3992873.jpeg"
    });
  }
}

// WhatsApp
function openWhatsApp() {
  window.open("https://wa.me/15145822856", "_blank");
}

</script>

</body>
</html>
