<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella Bay</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #ffe4ec, #ffd1dc);
}

/* FLOAT BUTTON */
.float-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg, #ff69b4, #ffb6c1);
  color: white;
  padding: 14px 20px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
  z-index: 2000;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: rgba(255,182,193,0.9);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
}

/* MENU LINKS */
.nav-links {
  display: flex;
  gap: 18px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HAMBURGER */
.hamburger {
  display: none;
  font-size: 28px;
  color: white;
  cursor: pointer;
}

/* MOBILE MENU */
.mobile-menu {
  display: none;
  position: absolute;
  top: 70px;
  right: 0;
  background: rgba(255,182,193,0.95);
  flex-direction: column;
  width: 200px;
  padding: 15px;
}

.mobile-menu a {
  color: white;
  text-decoration: none;
  padding: 10px 0;
  font-weight: bold;
}

/* BB LOGO (corrigé position) */
.logo-circle {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffb6c1, #b03060);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-weight: 900;

  /* 👇 recentrage léger */
  margin-right: 60px;

  box-shadow: 0 6px 15px rgba(0,0,0,0.25);
}

/* HERO */
header {
  padding: 130px 20px 90px;
  text-align: center;
  color: white;
  background:
    linear-gradient(rgba(255,182,193,0.75), rgba(255,105,180,0.85)),
    url("https://images.pexels.com/photos/3992873/pexels-photo-3992873.jpeg");
  background-size: cover;
  background-position: center;
}

header h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 64px;
}

/* SECTIONS */
section {
  max-width: 900px;
  margin: auto;
  padding: 70px 20px;
}

/* CARDS */
.card {
  background: #ffe4ec;
  padding: 16px;
  margin-bottom: 10px;
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
}

/* INSTAGRAM FIX (images réelles) */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.grid div {
  height: 160px;
  border-radius: 14px;
  background-size: cover;
  background-position: center;
}

/* images réelles cheveux */
.img1 { background-image: url("https://images.pexels.com/photos/3992873/pexels-photo-3992873.jpeg"); }
.img2 { background-image: url("https://images.pexels.com/photos/3992656/pexels-photo-3992656.jpeg"); }
.img3 { background-image: url("https://images.pexels.com/photos/3993314/pexels-photo-3993314.jpeg"); }
.img4 { background-image: url("https://images.pexels.com/photos/3997391/pexels-photo-3997391.jpeg"); }

</style>
</head>

<body>

<!-- FLOAT -->
<a class="float-btn" href="TON-LIEN-FRESHA" target="_blank">
  Réserver ✨
</a>

<!-- NAV -->
<div class="navbar">

  <div class="nav-links" id="menu">
    <a href="#accueil">Accueil</a>
    <a href="#services">Services</a>
    <a href="#inspi">Inspiration</a>
    <a href="TON-LIEN-FRESHA" target="_blank">Réserver</a>
  </div>

  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <div class="logo-circle">BB</div>

</div>

<!-- HERO -->
<header id="accueil">

  <h1>Bella Bay</h1>
  <p>Coiffure mobile Montréal & Laval</p>

</header>

<!-- SERVICES -->
<section id="services">

  <h2>Services</h2>

  <div class="card"><span>Coupe femme</span><span>60$ – 80$</span></div>
  <div class="card"><span>Brushing</span><span>60$ – 100$</span></div>
  <div class="card"><span>Coloration</span><span>90$ – 150$</span></div>

</section>

<!-- INSPIRATION FIXÉE -->
<section id="inspi">

  <h2>Inspiration</h2>

  <div class="grid">
    <div class="img1"></div>
    <div class="img2"></div>
    <div class="img3"></div>
    <div class="img4"></div>
  </div>

</section>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
