<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella Bay</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #ffe4ec, #ffd1dc);
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: rgba(255,182,193,0.92);
  display: flex;
  align-items: center;
  padding: 0 15px;
  z-index: 1000;
}

.bb-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffb6c1, #b03060);
  color: white;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CONTENT */
.content {
  margin-top: 80px;
  padding: 20px;
  max-width: 950px;
  margin-left: auto;
  margin-right: auto;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px 20px;
  color: white;
  border-radius: 20px;
  background:
    linear-gradient(rgba(255,182,193,0.80), rgba(255,105,180,0.85)),
    url("https://images.pexels.com/photos/3992873/pexels-photo-3992873.jpeg");
  background-size: cover;
  background-position: center;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 64px;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 14px 30px;
  border-radius: 30px;
  background: linear-gradient(135deg, #ff69b4, #ffb6c1);
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* CARD */
.card {
  background: #ffe4ec;
  padding: 16px;
  margin: 10px 0;
  border-radius: 14px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

form input, form select, form textarea {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  width: 100%;
  box-sizing: border-box;
}

form textarea {
  resize: none;
  height: 80px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="bb-btn">BB</div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- HERO -->
  <div class="hero">
    <h1>Bella Bay</h1>
    <p>Coiffure mobile à Montréal & Laval</p>
  </div>

  <!-- SERVICES -->
  <section>
    <h2>Services</h2>

    <div class="card">Coupe femme — 75$</div>
    <div class="card">Brushing — 50$</div>
    <div class="card">Coupe + Brushing — 120$</div>
    <div class="card">Coloration — à partir de 90$</div>
    <div class="card">Mèches — à partir de 120$</div>
    <div class="card">Balayage — à partir de 150$</div>
    <div class="card">Gloss — 70$</div>
    <div class="card">Extensions — consultation</div>
  </section>

  <!-- FORMULAIRE -->
  <section style="margin-top:40px;">
    <h2>Réserver un rendez-vous</h2>

    <form onsubmit="sendWhatsApp(event)">

      <input type="text" id="name" placeholder="Nom complet" required>

      <input type="tel" id="phone" placeholder="Numéro de téléphone" required>

      <select id="service" required>
        <option value="">Choisir un service</option>
        <option>Coupe femme - 75$</option>
        <option>Brushing - 50$</option>
        <option>Coupe + Brushing - 120$</option>
        <option>Coloration - à partir de 90$</option>
        <option>Mèches - à partir de 120$</option>
        <option>Balayage - à partir de 150$</option>
        <option>Gloss - 70$</option>
        <option>Extensions - consultation</option>
      </select>

      <input type="date" id="date" required>

      <textarea id="notes" placeholder="Notes (optionnel)"></textarea>

      <button class="btn" type="submit">
        Envoyer la réservation
      </button>

    </form>
  </section>

</div>

<script>

function sendWhatsApp(event) {
  event.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let date = document.getElementById("date").value;
  let notes = document.getElementById("notes").value;

  let message =
`💇‍♀️ Nouvelle réservation Bella Bay 💖

Nom: ${name}
Téléphone: ${phone}
Service: ${service}
Date: ${date}
Notes: ${notes}`;

  let url = "https://wa.me/15145822856?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

</script>

</body>
</html>
